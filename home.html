<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustANotepad — 홈</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta property="og:type" content="website">
<meta property="og:site_name" content="JustANotepad">
<meta property="og:title" content="JustANotepad — 홈 대시보드">
<meta property="og:description" content="최근 웹 클립, 공유 노트, 템플릿을 한 눈에 — JustANotepad 개인 홈">
<meta property="og:image" content="https://justanotepad.com/icons/icon-1024.png">
<meta property="og:locale" content="ko_KR">
<meta name="description" content="최근 웹 클립, 공유 노트, 템플릿을 한 눈에 확인하는 JustANotepad 개인 홈 대시보드.">
<style>
  :root {
    --ink:#1f2937; --soft:#6b7280; --faint:#9ca3af; --line:#e5e7eb;
    --accent:#D97757; --bg:#fafaf7; --panel:#fff; --success:#10b981;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.55; }

  .topbar {
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; gap:12px;
    padding:12px 24px; background:rgba(255,255,255,0.9);
    backdrop-filter:saturate(1.5) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .topbar .logo { width:28px; height:28px; border-radius:7px; background:#FAE100;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,serif; font-style:italic; font-weight:900; color:#fff; font-size:17px; }
  .topbar .brand { font-weight:700; }
  .topbar .spacer { flex:1; }
  .topbar .search {
    position:relative; display:flex; align-items:center;
  }
  .topbar .search svg {
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    width:14px; height:14px; color:var(--faint);
  }
  .topbar .search input {
    padding:7px 12px 7px 30px; border:1px solid var(--line); border-radius:7px;
    font-size:13px; width:240px; background:#fff;
  }
  .topbar .user { font-size:12px; color:var(--soft); }
  .topbar a { text-decoration:none; color:inherit; }
  .topbar .btn { padding:7px 12px; border-radius:7px; border:1px solid var(--line);
    background:#fff; font-size:12px; color:var(--ink); font-weight:600; cursor:pointer; }
  .topbar .btn:hover { background:#f3f4f6; }
  .topbar .btn.primary { background:#141414; color:#fff; border-color:#141414; }

  main { max-width:1180px; margin:0 auto; padding:28px 24px 80px; }
  h1.hello { font-size:28px; font-weight:800; letter-spacing:-0.02em; margin:0 0 6px; }
  .sub { color:var(--soft); font-size:14px; margin:0 0 28px; }

  .grid {
    display:grid; grid-template-columns:repeat(12, 1fr); gap:20px;
  }
  .widget {
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:22px;
  }
  .widget .head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .widget .head h3 { margin:0; font-size:15px; font-weight:700; flex:1; }
  .widget .head a { font-size:12px; color:var(--accent); text-decoration:none; font-weight:600; }
  .widget .empty { padding:24px 8px; text-align:center; color:var(--faint); font-size:13px; }

  /* Sized columns */
  .w-4 { grid-column:span 4; }
  .w-6 { grid-column:span 6; }
  .w-8 { grid-column:span 8; }
  .w-12 { grid-column:span 12; }
  @media (max-width: 960px) { .w-4,.w-6,.w-8 { grid-column:span 12; } }

  /* KPI strip */
  .kpi-strip { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:20px; }
  @media (max-width: 640px) { .kpi-strip { grid-template-columns:repeat(2, 1fr); } }
  .kpi {
    background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:16px 18px;
  }
  .kpi .lbl { color:var(--soft); font-size:11px; letter-spacing:0.04em; text-transform:uppercase; font-weight:700; }
  .kpi .val { font-size:26px; font-weight:800; letter-spacing:-0.02em; margin-top:4px; }

  /* Lists */
  .list-item {
    display:flex; align-items:center; gap:12px; padding:10px 0;
    border-bottom:1px solid var(--line); cursor:pointer;
    text-decoration:none; color:inherit;
  }
  .list-item:last-child { border-bottom:0; }
  .list-item:hover { background:#fafaf7; margin:0 -8px; padding:10px 8px; border-radius:6px; }
  .list-item .t { flex:1; font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .list-item .d { font-size:11px; color:var(--faint); white-space:nowrap; }
  .list-item .i { width:24px; height:24px; flex:0 0 24px; background:#f3f4f6;
    border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--soft); }
  .list-item .i svg { width:14px; height:14px; }

  /* Template tiles */
  .tpl-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
  @media (max-width: 640px) { .tpl-grid { grid-template-columns:repeat(2, 1fr); } }
  .tpl {
    border:1px solid var(--line); border-radius:10px; padding:14px; cursor:pointer;
    transition:transform 0.12s, border-color 0.12s; background:#fafaf7;
  }
  .tpl:hover { transform:translateY(-2px); border-color:var(--accent); background:#fff; }
  .tpl .tname { font-weight:700; font-size:13px; margin-bottom:4px; }
  .tpl .tcat { font-size:10px; color:var(--accent); text-transform:uppercase; letter-spacing:0.06em; font-weight:700; }
  .tpl .tdesc { color:var(--soft); font-size:12px; margin-top:6px; }

  /* Gate */
  .gate { padding:60px 20px; text-align:center; }
  .gate h2 { margin-bottom:10px; }
  .gate .btn { padding:10px 20px; background:#141414; color:#fff; border-radius:8px;
    display:inline-block; text-decoration:none; font-weight:600; font-size:14px; }
</style>
</head>
<body>

<header class="topbar">
  <a href="/"><div class="logo">j.</div></a>
  <div class="brand">JustANotepad</div>
  <div class="spacer"></div>
  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="globalSearch" placeholder="템플릿 / 클립 / 공유 노트 검색">
  </div>
  <span id="userEmail" class="user"></span>
  <a href="/graph" class="btn" title="공유 노트 관계 그래프">그래프</a>
  <a href="/app" class="btn primary">앱으로</a>
  <button id="btnSignOut" class="btn" style="display:none;">로그아웃</button>
</header>

<main id="main">
  <div id="gate" class="gate" style="display:none;">
    <h2>홈 대시보드는 로그인이 필요해요</h2>
    <p style="color:var(--soft);margin-bottom:16px;">계정이 있으면 이 곳에서 최근 클립, 공유 노트, 템플릿을 한눈에 확인할 수 있습니다.</p>
    <a href="/app?signin=1" class="btn">로그인</a>
  </div>

  <div id="dash" style="display:none;">
    <h1 class="hello" id="hello">환영합니다</h1>
    <p class="sub" id="subHello"></p>

    <div class="kpi-strip">
      <div class="kpi"><div class="lbl">내 클립</div><div class="val" id="kpiClips">—</div></div>
      <div class="kpi"><div class="lbl">공유 노트</div><div class="val" id="kpiShared">—</div></div>
      <div class="kpi"><div class="lbl">총 조회수</div><div class="val" id="kpiViews">—</div></div>
      <div class="kpi"><div class="lbl">템플릿</div><div class="val" id="kpiTpls">—</div></div>
    </div>

    <div class="grid">

      <!-- 템플릿으로 시작하기 -->
      <div class="widget w-8">
        <div class="head">
          <svg style="width:18px;height:18px;color:var(--accent);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="4"/><rect x="14" y="11" width="7" height="10"/><rect x="3" y="14" width="7" height="7"/></svg>
          <h3>템플릿으로 시작하기</h3>
          <a href="/app">모두 보기 →</a>
        </div>
        <div class="tpl-grid" id="tplGrid">로딩…</div>
      </div>

      <!-- 최근 웹 클립 -->
      <div class="widget w-4">
        <div class="head">
          <svg style="width:18px;height:18px;color:var(--accent);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          <h3>최근 웹 클립</h3>
          <a href="/app?view=clips">→</a>
        </div>
        <div id="clipsList">로딩…</div>
      </div>

      <!-- 내 공유 노트 -->
      <div class="widget w-6">
        <div class="head">
          <svg style="width:18px;height:18px;color:var(--accent);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          <h3>내 공유 노트</h3>
          <button class="btn" id="btnNewShare" style="padding:4px 10px;font-size:11px;">+ 새 공유 링크</button>
        </div>
        <div id="sharedList">로딩…</div>
      </div>

      <!-- 공지 -->
      <div class="widget w-6">
        <div class="head">
          <svg style="width:18px;height:18px;color:var(--accent);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-8v18z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
          <h3>공지사항</h3>
          <a href="/app">→</a>
        </div>
        <div id="noticesList">로딩…</div>
      </div>

    </div>
  </div>
</main>

<script src="/config.js"></script>
<script src="/feedback-widget.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(async () => {
  const $ = (id) => document.getElementById(id);
  const fmtDate = (s) => { if (!s) return ''; try { return new Date(s).toLocaleString('ko-KR', { dateStyle:'short', timeStyle:'short' }); } catch { return s; } };
  const fmtDateRel = (s) => {
    if (!s) return '';
    const d = new Date(s).getTime(); const now = Date.now();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return '방금';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    if (diff < 2592000) return Math.floor(diff/86400) + '일 전';
    return new Date(s).toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
  };
  const escape = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'})[c]);

  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
    auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true },
  });

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { $('gate').style.display = 'block'; return; }
  const user = session.user;
  $('dash').style.display = 'block';
  $('userEmail').textContent = user.email;
  $('btnSignOut').style.display = 'inline-flex';

  const hour = new Date().getHours();
  const greet = hour < 5 ? '좋은 새벽' : hour < 12 ? '좋은 아침' : hour < 18 ? '안녕하세요' : '좋은 저녁';
  $('hello').textContent = `${greet}, ${user.email.split('@')[0]}님`;
  $('subHello').textContent = `오늘은 ${new Date().toLocaleDateString('ko-KR', { weekday:'long', month:'long', day:'numeric' })}입니다.`;

  $('btnSignOut').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });

  // Load all widgets in parallel
  const [clipsRes, sharedRes, noticesRes, tplsRes, clipCount, sharedCount, tplCount] = await Promise.all([
    sb.from('cms_clips').select('id,url,title,excerpt,created_at').order('created_at', { ascending:false }).limit(5),
    sb.from('cms_shared_notes').select('token,title,view_count,created_at,mode').eq('owner_id', user.id).order('created_at', { ascending:false }).limit(5),
    sb.from('cms_notices').select('id,title,pinned,created_at').eq('published', true).order('pinned', { ascending:false }).order('created_at', { ascending:false }).limit(5),
    sb.from('cms_templates').select('slug,name,category,description,icon').eq('is_public', true).order('sort_order').limit(6),
    sb.from('cms_clips').select('*', { count:'exact', head:true }),
    sb.from('cms_shared_notes').select('view_count', { count:'exact' }).eq('owner_id', user.id),
    sb.from('cms_templates').select('*', { count:'exact', head:true }).eq('is_public', true),
  ]);

  // KPIs
  $('kpiClips').textContent = clipCount.count ?? '—';
  $('kpiShared').textContent = (sharedRes.data?.length) ?? 0;
  $('kpiViews').textContent = (sharedRes.data || []).reduce((a,r) => a + (r.view_count||0), 0);
  $('kpiTpls').textContent  = tplCount.count ?? '—';

  // Clips
  if (clipsRes.data && clipsRes.data.length) {
    $('clipsList').innerHTML = clipsRes.data.map(c => `
      <a class="list-item" href="${escape(c.url||'#')}" target="_blank" rel="noopener">
        <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></div>
        <div class="t">${escape(c.title || c.url || '(제목 없음)')}</div>
        <div class="d">${fmtDateRel(c.created_at)}</div>
      </a>`).join('');
  } else {
    $('clipsList').innerHTML = `<div class="empty">아직 저장된 클립이 없습니다.<br><br>
      <a href="https://github.com/auto1225/memo/tree/main/extensions/clipper" style="color:var(--accent);text-decoration:none;font-weight:600;">확장 설치하기 →</a></div>`;
  }

  // Shared
  if (sharedRes.data && sharedRes.data.length) {
    $('sharedList').innerHTML = sharedRes.data.map(s => `
      <a class="list-item" href="/s/${encodeURIComponent(s.token)}" target="_blank">
        <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
        <div class="t">${escape(s.title || '(제목 없음)')}</div>
        <div class="d">${s.view_count||0}회 · ${s.mode==='edit'?'편집':'읽기'}</div>
      </a>`).join('');
  } else {
    $('sharedList').innerHTML = '<div class="empty">공유한 노트가 없습니다.</div>';
  }

  $('btnNewShare').addEventListener('click', async () => {
    const title = prompt('노트 제목');
    if (!title) return;
    const body = prompt('본문 (Markdown)') || '';
    const token = Math.random().toString(36).slice(2, 14);
    const { error } = await sb.from('cms_shared_notes').insert({
      token, owner_id: user.id, title, body, mode: 'readonly',
    });
    if (error) { alert(error.message); return; }
    location.reload();
  });

  // Notices
  if (noticesRes.data && noticesRes.data.length) {
    $('noticesList').innerHTML = noticesRes.data.map(n => `
      <div class="list-item" style="cursor:default;">
        <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-8v18z"/></svg></div>
        <div class="t">${n.pinned ? '📌 ' : ''}${escape(n.title)}</div>
        <div class="d">${fmtDateRel(n.created_at)}</div>
      </div>`).join('');
  } else {
    $('noticesList').innerHTML = '<div class="empty">공지 없음</div>';
  }

  // Templates
  if (tplsRes.data && tplsRes.data.length) {
    $('tplGrid').innerHTML = tplsRes.data.map(t => `
      <div class="tpl" data-slug="${escape(t.slug)}">
        ${t.category ? `<div class="tcat">${escape(t.category)}</div>` : ''}
        <div class="tname">${escape(t.name)}</div>
        ${t.description ? `<div class="tdesc">${escape(t.description)}</div>` : ''}
      </div>`).join('');
    document.querySelectorAll('.tpl').forEach(el => el.addEventListener('click', () => {
      const slug = el.dataset.slug;
      // Jump into app with template preselected
      location.href = '/app?template=' + encodeURIComponent(slug);
    }));
  } else {
    $('tplGrid').innerHTML = '<div class="empty">템플릿 없음</div>';
  }

  // Global search (redirects to /admin search if admin, else does a simple cms_content search)
  $('globalSearch').addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if (!q) return;
    // Lightweight search across public tables
    location.href = '/app?q=' + encodeURIComponent(q);
  });
})();
</script>
</body>
</html>
