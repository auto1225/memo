<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JustANotepad 클리퍼</title>
<style>
  :root { --ink:#1f2937; --soft:#6b7280; --faint:#9ca3af; --line:#e5e7eb; --accent:#D97757; --bg:#FAFAF7; }
  body { margin:0; padding:0; width:340px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif; font-size:13px; color:var(--ink); }
  .hdr { display:flex; align-items:center; gap:8px; padding:14px 16px; border-bottom:1px solid var(--line); background:var(--bg); }
  .hdr .logo { width:28px; height:28px; border-radius:7px; background:#FAE100; display:flex; align-items:center; justify-content:center; font-family:Georgia,serif; font-style:italic; font-weight:900; color:#fff; font-size:17px; }
  .hdr .t { font-weight:700; font-size:14px; }
  .hdr .sub { color:var(--soft); font-size:11px; }
  .body { padding:14px 16px; }
  .meta { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .meta label { font-size:11px; color:var(--soft); }
  .meta input, .meta textarea { border:1px solid var(--line); border-radius:6px; padding:7px 10px; font-size:12px; font-family:inherit; resize:vertical; }
  .row { display:flex; gap:8px; align-items:center; }
  .btn { flex:1; padding:9px 12px; border:1px solid var(--line); border-radius:7px; background:#fff; font-size:13px; font-weight:600; cursor:pointer; text-align:center; }
  .btn:hover { background:#f3f4f6; }
  .btn.primary { background:#141414; color:#fff; border-color:#141414; }
  .btn.primary:hover { background:#333; }
  .gate { padding:20px 16px; text-align:center; }
  .gate p { color:var(--soft); margin:10px 0 14px; }
  .status { padding:10px 14px; font-size:12px; border-top:1px solid var(--line); color:var(--soft); }
  .status.ok { background:#ecfdf5; color:#065f46; }
  .status.err { background:#fef2f2; color:#991b1b; }
  .user { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#eff6ff; border-radius:6px; margin-bottom:10px; font-size:11px; color:#1e40af; }
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">j.</div>
  <div>
    <div class="t">JustANotepad 클리퍼</div>
    <div class="sub">현재 페이지를 수신함에 저장</div>
  </div>
</div>

<div id="gate" class="gate" style="display:none;">
  <p>먼저 <b>justanotepad.com</b>에 로그인한 뒤, 아래 버튼으로 확장 연결을 완료해주세요.</p>
  <button class="btn primary" id="btnLogin">justanotepad.com 열기</button>
  <button class="btn" id="btnRefresh" style="margin-top:8px;">로그인 확인</button>
</div>

<div id="app" class="body" style="display:none;">
  <div class="user" id="who"></div>
  <div class="meta">
    <label>제목</label>
    <input id="clipTitle">
    <label>태그 (콤마로 구분)</label>
    <input id="clipTags" placeholder="읽을거리, 영감">
    <label>메모 (선택)</label>
    <textarea id="clipNote" rows="3" placeholder="이 페이지에 대한 내 생각"></textarea>
  </div>
  <div class="row">
    <button class="btn primary" id="btnFull">전체 페이지</button>
    <button class="btn" id="btnSelection">선택 영역</button>
  </div>
  <div class="row" style="margin-top:8px;">
    <button class="btn" id="btnUrlOnly">URL만</button>
    <button class="btn" id="btnOpenInbox">수신함 열기</button>
  </div>
</div>

<div class="status" id="status"></div>

<script type="module" src="popup.js"></script>
</body>
</html>
