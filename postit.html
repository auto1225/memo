<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포스트잇</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    /* 포스트잇 전용 최소 스타일 — 앱 스크립트 / CSS 하나도 안 로드함 */
    html, body {
      margin: 0; padding: 0; height: 100vh; overflow: hidden;
      background: transparent;
      font: 14px/1.5 -apple-system, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
      color: rgba(0,0,0,0.85);
    }
    /* 스크립트 로딩 전 흰 화면 방지: 기본 노란 배경 + 로딩 표시 */
    body { background: #fff6a5; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(0,0,0,0.4); font-size: 12px;
    }
  </style>
</head>
<body>
  <!-- 스크립트가 mount 되기 전 최소 표시 -->
  <div id="loading">포스트잇 로딩 중…</div>

  <!-- URL 이 ?mode=postit 가 아니면 postit-desktop.js 가 종료하므로 force -->
  <script>
    // postit-desktop.js 는 URL 에 mode=postit 가 있어야 활성화됨.
    // 이 페이지는 전용 페이지라 URL 에 없을 수도 있으니 강제로 주입.
    try {
      const u = new URL(location.href);
      if (u.searchParams.get('mode') !== 'postit') {
        u.searchParams.set('mode', 'postit');
        history.replaceState(null, '', u.toString());
      }
      if (!u.searchParams.get('id')) {
        // id 없으면 임시 id 부여 (Tauri 에서는 항상 id 를 넘겨줌)
        u.searchParams.set('id', 'standalone-' + Date.now());
        history.replaceState(null, '', u.toString());
      }
    } catch (e) { console.warn('[postit.html] URL 조정 실패', e); }
  </script>

  <!-- 전역 에러 감지: postit-desktop.js 로딩/실행 실패 시 사용자에게 표시 -->
  <script>
    window.addEventListener('error', function (ev) {
      const root = document.getElementById('postit-root');
      if (root) return; // UI 가 이미 뜬 상태면 무시
      const l = document.getElementById('loading');
      if (l) {
        l.innerHTML =
          '<div style="padding:20px;max-width:90%;">' +
          '<p style="color:#c00;margin:0 0 8px;font-weight:600;">포스트잇 로딩 실패</p>' +
          '<p style="margin:0 0 8px;font-size:11px;color:#666;word-break:break-all;">' +
          ((ev.error && ev.error.message) || ev.message || 'unknown').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) +
          '</p>' +
          '<button onclick="location.reload()" style="padding:4px 10px;cursor:pointer;">다시 시도</button>' +
          '</div>';
      }
    });
  </script>

  <!-- 캐시 우회 위해 ?v= 버전 파라미터 -->
  <script src="/postit-desktop.js?v=2"></script>

  <!-- postit-desktop.js 가 root 를 만든 뒤 로딩 인디케이터 제거 -->
  <script>
    (function watchMount() {
      const start = Date.now();
      const t = setInterval(() => {
        if (document.getElementById('postit-root')) {
          const l = document.getElementById('loading');
          if (l) l.remove();
          clearInterval(t);
        } else if (Date.now() - start > 6000) {
          // 6초 지나도 안 뜨면 에러 표시
          const l = document.getElementById('loading');
          if (l && l.innerText.trim() === '포스트잇 로딩 중…') {
            l.innerHTML =
              '<div style="padding:20px;max-width:90%;">' +
              '<p style="color:#c00;margin:0 0 8px;font-weight:600;">포스트잇 스크립트가 응답하지 않습니다</p>' +
              '<button onclick="location.reload()" style="padding:4px 10px;cursor:pointer;">다시 시도</button>' +
              '</div>';
          }
          clearInterval(t);
        }
      }, 200);
    })();
  </script>
</body>
</html>
