name: Tauri Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write
  issues: write
  pull-requests: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            name: macos
            # macOS 캐시 키를 arch 별로 분리 (universal 은 둘 다 빌드)
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            name: windows
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # ⬇️ Rust 빌드 캐시 — 이게 핵심. 첫 빌드 후 매번 ~15min → ~3~5min.
      # src-tauri/target 와 ~/.cargo 를 캐시. Cargo.lock 해시로 키를 만드므로
      # 의존성 변경시에만 캐시 재생성됨.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          # 플랫폼별 + target 별로 키 분리 (universal macOS 는 두 arch 모두 캐시)
          key: ${{ matrix.name }}-${{ matrix.rust-targets }}
          # PR/브랜치 빌드가 아닌 메인/태그 빌드만 캐시 저장 (용량 절약)
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # sccache 도 같이 쓰면 더 빨라질 수 있으나 Swatinem cache 만으로도 충분
          CARGO_INCREMENTAL: '0'
          CARGO_NET_RETRY: '10'
          RUST_BACKTRACE: 'short'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'JustANotepad ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          includeUpdaterJson: true
