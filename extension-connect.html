<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustANotepad — 확장 연결</title>
<meta name="robots" content="noindex, nofollow">
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:#FAFAF7; color:#1f2937; }
  .card { max-width:440px; padding:40px 36px; background:#fff;
    border:1px solid #e5e7eb; border-radius:12px; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.12); }
  .logo { width:56px; height:56px; border-radius:12px; background:#FAE100;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,serif; font-style:italic; font-weight:900;
    color:#fff; font-size:28px; margin:0 auto 16px; }
  h1 { font-size:22px; font-weight:700; margin:0 0 8px; }
  p { color:#6b7280; line-height:1.6; margin:0 0 20px; }
  .status { padding:12px 16px; border-radius:8px; font-size:13px; margin:16px 0; }
  .status.idle { background:#f3f4f6; color:#6b7280; }
  .status.ok { background:#ecfdf5; color:#065f46; }
  .status.err { background:#fef2f2; color:#991b1b; }
  .btn { display:inline-block; padding:12px 28px; background:#141414; color:#fff;
    border:0; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; text-decoration:none; }
  .btn:hover { background:#333; }
  .kbd { display:inline-block; padding:2px 8px; background:#f3f4f6; border:1px solid #e5e7eb;
    border-radius:4px; font-family:ui-monospace,monospace; font-size:11px; }
  .muted { font-size:12px; color:#9ca3af; margin-top:24px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">j.</div>
  <h1>확장 연결</h1>
  <p>JustANotepad에 로그인한 뒤 아래 버튼으로 브라우저 확장과 계정을 연결하세요.</p>

  <div class="status idle" id="status">세션 확인 중…</div>

  <div id="whenSignedOut" style="display:none;">
    <a href="/app?signin=1" class="btn">로그인</a>
  </div>
  <div id="whenSignedIn" style="display:none;">
    <button class="btn" id="btnConnect">이 확장에 연결</button>
  </div>
  <div id="whenDone" style="display:none;">
    <p style="color:#065f46;font-weight:600;">✓ 연결 완료. 이제 브라우저 툴바의 <span class="kbd">j.</span> 아이콘이나 <span class="kbd">Ctrl+Shift+J</span>로 현재 페이지를 저장할 수 있습니다.</p>
  </div>

  <div class="muted">
    이 페이지는 확장을 설치한 후에만 의미가 있습니다. 아직 설치하지 않았다면
    <a href="https://github.com/auto1225/memo/tree/main/extensions/clipper" target="_blank" rel="noopener">설치 가이드</a>를 확인하세요.
  </div>
</div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(async () => {
  // NOTE: replace with your published extension IDs after uploading to the
  // Chrome Web Store / Edge Add-ons. Unpacked dev loads get a random ID; the
  // user can paste it here OR we can read it from a query param (?ext=...).
  const params = new URLSearchParams(location.search);
  const EXT_IDS = [
    // production IDs go here after store approval
    params.get('ext'),
  ].filter(Boolean);

  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
  });

  const status = document.getElementById('status');
  const set = (cls, msg) => { status.className = 'status ' + cls; status.textContent = msg; };

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    set('idle', '먼저 JustANotepad에 로그인해주세요.');
    document.getElementById('whenSignedOut').style.display = 'block';
    return;
  }

  set('ok', '로그인됨: ' + session.user.email);
  document.getElementById('whenSignedIn').style.display = 'block';

  document.getElementById('btnConnect').addEventListener('click', async () => {
    if (!chrome?.runtime?.sendMessage) {
      set('err', 'chrome.runtime이 접근 불가합니다. 확장이 설치돼 있고 externally_connectable 매니페스트가 켜져 있는지 확인하세요.');
      return;
    }
    if (!EXT_IDS.length) {
      set('err', '확장 ID를 찾을 수 없습니다. URL에 ?ext=<확장ID>를 붙여 다시 시도해주세요.');
      return;
    }
    let connected = false;
    for (const id of EXT_IDS) {
      try {
        const res = await new Promise((resolve) => {
          chrome.runtime.sendMessage(id, {
            type: 'jnp-login',
            access_token: session.access_token,
            refresh_token: session.refresh_token,
            expires_in: session.expires_in,
            email: session.user.email,
          }, (r) => resolve(r));
          setTimeout(() => resolve(null), 1500);
        });
        if (res?.ok) { connected = true; break; }
      } catch {}
    }
    if (connected) {
      set('ok', '✓ 확장과 연결되었습니다.');
      document.getElementById('whenSignedIn').style.display = 'none';
      document.getElementById('whenDone').style.display = 'block';
    } else {
      set('err', '확장에 닿지 못했습니다. 확장이 활성 상태인지 확인해주세요.');
    }
  });
})();
</script>
</body>
</html>
